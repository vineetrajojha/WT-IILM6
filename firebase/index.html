<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portal — Register</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <a href="index.html" class="logo">🎓 Student Portal</a>
    <nav>
      <a href="index.html" class="active">Register</a>
      <a href="students.html">View Students</a>
    </nav>
  </header>

  <!-- Main -->
  <main>
    <h1 class="page-title">Student Registration</h1>
    <p class="page-subtitle">Fill in the details below to register a new student.</p>

    <div class="card">
      <div class="form-group">
        <label for="regId">Registration ID</label>
        <input type="text" id="regId" placeholder="e.g. REG2024001" />
      </div>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="e.g. Riya Sharma" />
      </div>
      <div class="form-group">
        <label for="branch">Branch</label>
        <select id="branch">
          <option value="">— Select Branch —</option>
          <option>Computer Science</option>
          <option>Electronics & Communication</option>
          <option>Mechanical Engineering</option>
          <option>Civil Engineering</option>
          <option>Information Technology</option>
          <option>Electrical Engineering</option>
        </select>
      </div>
      <div class="form-group">
        <label for="marks">Total Marks</label>
        <input type="number" id="marks" placeholder="e.g. 450" min="0" max="500" />
      </div>
      <button class="btn btn-primary" id="submitBtn">Register Student</button>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Student Portal. Built with Firebase &amp;  JS.</p>
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
